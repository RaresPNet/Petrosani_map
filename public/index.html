<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Petroșani de altă dată</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="src/editing/newPin.css">
    <link rel="icon" type="image/x-icon" href="./assets/icons/favicon.ico">
    <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>
</head>
<body>
    <div id="pin-notification"></div>
    <button id="arrow-up" class="pin-type-arrow pin-type-arrow--up" aria-label="Tip anterior">
        <svg viewBox="0 0 40 24" width="40" height="24"><polyline points="4,20 20,4 36,20" fill="none" stroke="white" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button id="arrow-down" class="pin-type-arrow pin-type-arrow--down" aria-label="Tip următor">
        <svg viewBox="0 0 40 24" width="40" height="24"><polyline points="4,4 20,20 36,4" fill="none" stroke="white" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div id="container">
        <div id="map"></div>
    </div>
    <script type="module" src="src/main.js"></script>
</body>
</html>
