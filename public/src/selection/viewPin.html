<div id="view-pin-panel">
  <div class="view-panel-header">
    <h2 class="view-panel-title"></h2>
    <div class="view-panel-header-actions">
      <button class="view-panel-edit" aria-label="Editează">
        <img src="./assets/icons/pen.ico" width="14" height="14" alt=""/>
      </button>
      <button class="view-panel-close" aria-label="Închide">&#x2715;</button>
    </div>
  </div>
  <div class="view-panel-body">
    <p class="view-panel-description"></p>
    <div class="view-panel-photos">
      <img class="view-panel-photos-icon" src="./assets/icons/photos.ico" width="32" height="32" alt=""/>
      <span class="view-panel-photos-label">Fără imagini</span>
    </div>
  </div>
</div>
