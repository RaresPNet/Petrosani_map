<div id="new-pin-panel">
  <div class="panel-header">
    <span class="panel-header-title"></span>
    <div class="panel-header-actions">
      <button class="panel-delete" aria-label="Șterge">
        <img src="./assets/icons/trashcan.ico" width="14" height="14" alt=""/>
        <span class="panel-delete-label"></span>
        <span class="panel-delete-cancel">&#x2715;</span>
      </button>
      <button class="panel-close" aria-label="Închide">&#x2715;</button>
    </div>
  </div>
  <div class="panel-body">
    <input
      class="panel-title"
      type="text"
      placeholder="Introduceți numele locației"
      spellcheck="false"
      autocomplete="off"
    />
    <div class="panel-divider"></div>
    <textarea
      class="panel-description"
      placeholder="Introduceți descrierea"
      spellcheck="false"
    ></textarea>
    <div class="panel-photos">
      <span class="panel-photos-label">Adaugă fotografii</span>
    </div>
    <div class="panel-actions">
      <button class="panel-save">Salvează</button>
    </div>
  </div>
</div>
