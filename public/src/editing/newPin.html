<div id="new-pin-panel">
  <div class="panel-inner">
    <input
      class="panel-title"
      type="text"
      placeholder="Introduceți numele locației"
      spellcheck="false"
      autocomplete="off"
    />
    <div class="panel-divider"></div>
    <textarea
      class="panel-description"
      placeholder="Introduceți descrierea"
      spellcheck="false"
    ></textarea>
    <button class="panel-save">Salvează</button>
  </div>
</div>
