<div id="new-pin-panel">
  <div class="panel-inner">
    <button class="panel-close" aria-label="Închide">&#x2715;</button>
    <input
      class="panel-title"
      type="text"
      placeholder="Introduceți numele locației"
      spellcheck="false"
      autocomplete="off"
    />
    <div class="panel-divider"></div>
    <textarea
      class="panel-description"
      placeholder="Introduceți descrierea"
      spellcheck="false"
    ></textarea>
    <div class="panel-actions">
      <button class="panel-save">Salvează</button>
      <button class="panel-delete" aria-label="Șterge">
        <img src="./assets/icons/trashcan.ico" width="16" height="16" alt=""/>
      </button>
    </div>
  </div>
</div>
